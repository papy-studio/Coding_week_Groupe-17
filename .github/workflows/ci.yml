name: MediObes CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-html

      - name: 🧪 Run model tests
        run: |
          pytest tests/test_models.py -v --tb=short

      - name: 🔁 Run patient flow tests
        run: |
          pytest tests/test_patient_flow.py -v --tb=short

      - name: 📊 Generate HTML report
        if: always()
        run: |
          pytest tests/ -v --tb=short --html=tests/rapport_tests.html --self-contained-html

      - name: 📤 Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests
          path: tests/rapport_tests.html
